server {
    listen 9000;
    server_name localhost host.docker.internal;

    location / {
        proxy_pass http://operis-keycloak:8080;

        # Use $http_host instead of 'localhost'
        # This passes "localhost:9000" instead of just "localhost"
        proxy_set_header Host $http_host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Crucial for Keycloak to know it's behind a proxy
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 9000;

        # Required for Keycloak Admin Console/Websockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}