server:
  port: 8888
  address: 0.0.0.0

spring:
  application:
    name: operis-configuration-server

  profiles:
    active: git

  cloud:
    config:
      server:
        git:
          uri: https://github.com/marvinkn97/operis-configuration-repo.git
          default-label: master
          clone-on-start: true
          force-pull: true

  rabbitmq:
    host: localhost
    port: 5672
    username: operis
    password: password


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - busrefresh
          - prometheus
          - metrics
          - circuitbreakers
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    circuitbreakers:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    circuitbreakers:
      enabled: true
  tracing:
    export:
      otlp:
        enabled: true
      enabled: true
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          transport: http
  otlp:
    metrics:
      export:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: docker
    data:
      redis:
        host: redis
        port: 6379
        password: password

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: operis
    password: password

management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://tempo:4318/v1/traces
          transport: http


