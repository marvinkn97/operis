networks:
  operis-network:
    driver: bridge

volumes:
  keycloak-data:
  postgres-keycloak-data:
  postgres-project-data:
  postgres-user-data:
  postgres-cta-data:
  postgres-task-data:
  postgres-subscription-data:
  pgadmin-data:
  maildev-data:
  rabbitmq-data:
  vault-data:
  tempo-data:
  redis-data:
  kafka-data:

services:
  #  KEYCLOAK:
  postgres-operis-keycloak:
    container_name: operis-postgres-keycloak
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    networks:
      - operis-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak -d keycloak_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    container_name: operis-keycloak
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_DB: postgres
      KC_DB_URL_HOST: postgres-operis-keycloak
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HEALTH_ENABLED: "true"
      # FIX 1: Force health endpoints to port 8080 instead of 9000
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "false"
      KC_PROXY_ADDRESS_FORWARDING: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9000
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_BACKCHANNEL: "false"
      KC_PROXY: edge
    command: start-dev
    depends_on:
      postgres-operis-keycloak:
        condition: service_healthy
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - operis-network

  keycloak-proxy:
    image: nginx:latest
    container_name: operis-keycloak-proxy
    ports:
      - "9000:9000"   # Browser accesses localhost:9000
    volumes:
      - ./nginx-keycloak.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
     keycloak:
       condition: service_started
    networks:
      - operis-network

  # ANGULAR FRONTEND:
  operis-angular-ui:
    container_name: operis-angular-ui
    pull_policy: always
    image: marvin237/operis-ui:latest
    ports:
      - "4200:80"
    networks:
      - operis-network
    depends_on:
      keycloak:
        condition: service_started
    restart: unless-stopped

  # PGADMIN:
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: operis-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@operis.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    networks:
      - operis-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped


  # CONFIGURATION SERVER:
  operis-configuration-server:
    container_name: operis-configuration-server
    pull_policy: always
    image: marvin237/operis-configserver:latest
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,git
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - SPRING_CLOUD_CONFIG_IMPORT_CHECK=false
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - operis-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # This uses a built-in bash feature to check the port.
      # It doesn't need curl, wget, or netcat installed in the image.
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8888' || exit 1" ]
      interval: 15s      # Check every 15s
      timeout: 10s       # Wait 10s for response
      retries: 6         # Total check window: ~90s
      start_period: 150s # Gives your 78s app plenty of time to warm up

  #   SERVICE DISCOVERY:
  operis-discovery-service:
    container_name: operis-discovery-service
    pull_policy: always
    image: marvin237/operis-servicediscovery:latest
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888/
    networks:
      - operis-network
    depends_on:
      operis-configuration-server:
        condition: service_started
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/8761' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # API GATEWAY:
  operis-apigateway:
    pull_policy: always
    image: marvin237/operis-apigateway:latest # Fixed your handle to match previous prompts
    container_name: operis-apigateway
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888/
      - EUREKA_URI=http://operis-discovery-service:8761/eureka/
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI=http://localhost:9000/realms/operis
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI=http://keycloak:8080/realms/operis/protocol/openid-connect/certs
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
       # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-user-service
      - MANAGEMENT_SERVER_PORT=9090
    networks:
      - operis-network
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_started
      operis-discovery-service:
        condition: service_healthy
      operis-cta-service:
        condition: service_healthy
      operis-project-service:
        condition: service_healthy
      operis-notification-service:
        condition: service_healthy
      operis-subscription-service:
        condition: service_healthy
      operis-task-service:
        condition: service_healthy
      operis-user-service:
        condition: service_healthy


  # PROJECT SERVICE:
  postgres-operis-project:
    container_name: postgres-operis-project
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operis_project_db
    volumes:
      - postgres-project-data:/var/lib/postgresql/data
    ports:
      - "54321:5432"
    networks:
      - operis-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d operis_project_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  operis-project-service:
    image: marvin237/operis-project-service:latest
    pull_policy: always
    container_name: operis-project-service
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URL=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-project-service
      - MANAGEMENT_SERVER_PORT=9091
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      operis-discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
      postgres-operis-project:
        condition: service_healthy
      postgres-operis-task:
        condition: service_healthy
    networks:
      - operis-network
    volumes:
      - ./logs/project-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9091' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # TASK SERVICE:
  postgres-operis-task:
    container_name: postgres-operis-task
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operis_task_db
    volumes:
      - postgres-task-data:/var/lib/postgresql/data
    ports:
      - "54324:5432"
    networks:
      - operis-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d operis_task_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  operis-task-service:
    image: marvin237/operis-task-service:latest
    pull_policy: always
    container_name: operis-task-service
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-task-service
      - MANAGEMENT_SERVER_PORT=9095
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      operis-discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
      postgres-operis-task:
        condition: service_healthy
    networks:
      - operis-network
    volumes:
      - ./logs/task-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9095' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # SUBSCRIPTION SERVICE:
  postgres-operis-subscription:
    container_name: postgres-operis-subscription
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operis_subscription_db
    volumes:
      - postgres-subscription-data:/var/lib/postgresql/data
    ports:
      - "54325:5432"
    networks:
      - operis-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d operis_subscription_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  operis-subscription-service:
    image: marvin237/operis-subscription-service:latest
    pull_policy: always
    container_name: operis-subscription-service
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-subscription-service
      - MANAGEMENT_SERVER_PORT=9096
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PRODUCT_PRICE_ID={$PRODUCT_PRICE_ID}
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      operis-discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
      postgres-operis-subscription:
        condition: service_healthy
    networks:
      - operis-network
    volumes:
      - ./logs/subscription-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9096' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # CTA SERVICE:
  postgres-operis-cta:
    container_name: postgres-operis-cta
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operis_cta_db
    volumes:
      - postgres-cta-data:/var/lib/postgresql/data
    ports:
      - "54323:5432"
    networks:
      - operis-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d operis_cta_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  operis-cta-service:
    image: marvin237/operis-cta-service:latest
    pull_policy: always
    container_name: operis-cta-service
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-cta-service
      - MANAGEMENT_SERVER_PORT=9094
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      operis-discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
      operis-project-service:
        condition: service_healthy
      operis-task-service:
        condition: service_healthy
    networks:
      - operis-network
    volumes:
      - ./logs/cta-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9094' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # NOTIFICATION SERVICE:
  operis-notification-service:
    image: marvin237/operis-notification-service:latest
    pull_policy: always
    container_name: operis-notification-service
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-notification-service
      - MANAGEMENT_SERVER_PORT=9093
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      maildev:
        condition: service_started
      keycloak:
        condition: service_started
      operis-discovery-service:
        condition: service_healthy
      operis-project-service:
        condition: service_healthy
      operis-cta-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - operis-network
    volumes:
      - ./logs/notification-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9093' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # USER SERVICE:
  postgres-operis-user:
    container_name: postgres-operis-user
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operis_user_db
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    networks:
      - operis-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d operis_user_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  operis-user-service:
    image: marvin237/operis-user-service:latest
    pull_policy: always
    container_name: operis-user-service
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_SERVER_URI=http://operis-configuration-server:8888
      - MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT=http://tempo:4318/v1/traces
      # This ensures the metrics stay disabled as per your snippet
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
      # Your service "Caller ID"
      - OTEL_SERVICE_NAME=operis-user-service
      - MANAGEMENT_SERVER_PORT=9092
    depends_on:
      operis-configuration-server:
        condition: service_healthy
      operis-discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - operis-network
    volumes:
      - ./logs/user-service:/app/logs
    healthcheck:
      # Checks if the management port 9091 is accepting connections
      test: [ "CMD-SHELL", "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9092' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 150s # Increased slightly to ensure Java 25 is fully warm

  # MAILDEV:
  maildev:
    container_name: operis-maildev
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "1080:1080"   # Web UI
      - "1025:1025"   # SMTP
    volumes:
      - maildev-data:/home/node/maildev
    networks:
      - operis-network

  # RABBITMQ:
  rabbitmq:
    container_name: operis-rabbitmq
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: operis
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - operis-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s      # How often to check
      timeout: 5s       # How long to wait for the check to respond
      retries: 10       # How many failures before giving up
      start_period: 30s # Wait 30s before the first check (gives the JVM time to boot)

  vault:
    container_name: operis-vault
    image: hashicorp/vault:1.15
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/file
    networks:
      - operis-network
    command: vault server -dev

  read:
    image: grafana/loki:latest
    command: "-config.file=/etc/loki/config.yaml -target=read"
    ports:
      - 3101:3100
      - 7946
      - 9095
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml
    depends_on:
      - minio
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: &loki-dns
      operis-network:
        aliases:
          - loki

  write:
    image: grafana/loki:latest
    command: "-config.file=/etc/loki/config.yaml -target=write"
    ports:
      - 3102:3100
      - 7946
      - 9095
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - minio
    networks:
      <<: *loki-dns

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./alloy-local-config.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - 12345:12345
    depends_on:
      - gateway
    networks:
      - operis-network

  minio:
    image: minio/minio
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - 9000
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5
    networks:
      - operis-network

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - gateway
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://gateway:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "tenant1"
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
          - name: Tempo
            type: tempo
            access: proxy
            url: http://tempo:3200
        EOF
        /run.sh
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - operis-network

  backend:
    image: grafana/loki:latest
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml -target=backend -legacy-read-mode=false"
    depends_on:
      - gateway
    networks:
      - operis-network

  gateway:
    image: nginx:latest
    depends_on:
      - read
      - write
    entrypoint:
      - sh
      - -euc
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        user  nginx;
        worker_processes  5;  ## Default: 1
        
        events {
          worker_connections   1000;
        }
        
        http {
          resolver 127.0.0.11;
        
          server {
            listen             3100;
        
            location = / {
              return 200 'OK';
              auth_basic off;
            }
        
            location = /api/prom/push {
              proxy_pass       http://write:3100\$$request_uri;
            }
        
            location = /api/prom/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }
        
            location ~ /api/prom/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
        
            location = /loki/api/v1/push {
              proxy_pass       http://write:3100\$$request_uri;
            }
        
            location = /loki/api/v1/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }
        
            location ~ /loki/api/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
          }
        }
        EOF
        /docker-entrypoint.sh nginx -g "daemon off;"
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - operis-network

  prometheus:
    image: prom/prometheus:latest
    container_name: operis-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - operis-network
    restart: unless-stopped

  tempo-init:
    image: alpine:latest
    container_name: tempo-init
    command: >
      sh -c "
        mkdir -p /tempo-data/wal /tempo-data/blocks &&
        chown -R 10001:10001 /tempo-data
      "
    volumes:
      - tempo-data:/tempo-data
    networks:
      - operis-network
    restart: "no"


  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    ports:
      - "3200:3200"   # Grafana queries Tempo
      - "4317:4317"   # gRPC for OTEL exporters
      - "4318:4318"   #HTTP
    volumes:
      - tempo-data:/tempo-data
      - ./tempo.yml:/etc/tempo/tempo.yml:ro
    command: [ "-config.file=/etc/tempo/tempo.yml" ]
    networks:
      - operis-network
    depends_on:
      - tempo-init

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6378:6379"
    command: >
      redis-server
      --requirepass password
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - operis-network

  kafka:
    image: apache/kafka-native:4.1.1
    container_name: operis-kafka
    restart: unless-stopped
    ports:
      - "29092:9092"   # 👈 Host-safe external port
    environment:
      # KRaft mode (modern Kafka, no Zookeeper)
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners (internal + external separation)
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,INTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:29092,INTERNAL://kafka:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Dev-friendly configs
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - operis-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: operis-kafka-ui
    restart: unless-stopped
    ports:
      - "8091:8080"   # 👈 changed from 8090 to avoid conflicts
    environment:
      KAFKA_CLUSTERS_0_NAME: operis-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      - kafka
    networks:
      - operis-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: operis-schema-registry
    restart: unless-stopped
    ports:
      - "8086:8081"   # 👈 safe unused host port
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
    networks:
      - operis-network



