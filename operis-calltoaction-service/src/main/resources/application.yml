server:
  port: 0

spring:
  application:
    name: operis-cta-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  cloud:
    config:
      enabled: true

logging:
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

rabbitmq:
  queue:
    invitation-cta-service: project.invitation.cta.queue
    task-cta-service: task.cta.queue