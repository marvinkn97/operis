server {
    listen 80;
    resolver 127.0.0.11 valid=30s;
    root /usr/share/nginx/html;

    # 1. Keycloak REALMS (The Login Logic)
    location /auth/realms/ {
        set $target_keycloak http://keycloak:8080;
        proxy_pass $target_keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. KEYCLOAK RESOURCES (The fix for your 404s)
    # This captures the CSS, Patternfly, and JS files you see in your error log
    location /resources/ {
        set $target_keycloak http://keycloak:8080;
        proxy_pass $target_keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. API Gateway
    location /api/ {
        set $target_gateway http://operis-apigateway:8080;
        proxy_pass $target_gateway;
        proxy_set_header Host $host;
    }

    # 4. Angular Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }
}